<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} — MediCare Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      :root { --primary: #0f6cbd; --primary-light: #e8f3fc; }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: linear-gradient(135deg, #e8f3fc 0%, #f0f9ff 60%, #e0f2fe 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .register-card {
        width: 100%;
        max-width: 480px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 40px rgba(15,108,189,.12);
        padding: 2.25rem 2rem;
      }

      .brand-icon {
        width: 48px; height: 48px;
        background: var(--primary);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 1.25rem;
        margin: 0 auto 1.1rem;
      }

      h2 { font-size: 1.375rem; font-weight: 800; text-align: center; margin-bottom: .2rem; }
      .subtitle { font-size: .85rem; color: #6b7280; text-align: center; margin-bottom: 1.5rem; }

      form p { margin-bottom: .8rem; }
      form p label { display: block; font-size: .875rem; font-weight: 600; margin-bottom: .3rem; color: #374151; }

      form input[type=text], form input[type=email], form input[type=password],
      form input[type=number], form select, form textarea {
        display: block; width: 100%;
        padding: .575rem .875rem;
        font-size: .875rem;
        border: 1.5px solid #e5e7eb;
        border-radius: 10px;
        font-family: inherit;
        transition: border-color .15s, box-shadow .15s;
      }

      form input:focus, form select:focus, form textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(15,108,189,.12);
      }

      .btn-register {
        width: 100%;
        padding: .675rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: .9375rem;
        font-weight: 700;
        cursor: pointer;
        transition: background .15s;
        margin-top: .5rem;
      }

      .btn-register:hover { background: #0a55a8; }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 1rem;
        font-size: .875rem;
        color: #6b7280;
        text-decoration: none;
      }
      .back-link:hover { color: var(--primary); }

      ul.errorlist { list-style: none; padding: 0; margin: .25rem 0 0; }
      ul.errorlist li { font-size: .8rem; color: #dc2626; }
    </style>
  </head>
  <body>
    <div class="register-card">
      <div class="brand-icon"><i class="bi bi-hospital"></i></div>
      <h2>{{ title }}</h2>
      <p class="subtitle">Create your account to get started</p>

      <form action="" method="POST">
        {% csrf_token %}
        {{ form_data.as_p }}
        <button type="submit" class="btn-register">
          <i class="bi bi-person-plus me-2"></i>{{ btn|default:"Register" }}
        </button>
      </form>

      <a href="{% url 'login_page' %}" class="back-link">
        <i class="bi bi-arrow-left me-1"></i>Already have an account? Sign in
      </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
