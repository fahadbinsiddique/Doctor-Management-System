{% extends 'master/base.html' %}


{% block blockname %}
<div class="my-4">
  <div class="btn-group" role="group" aria-label="Basic example">
  <button type="button" class="btn btn-secondary">Username: {{request.user}}</button>
  <button type="button" class="btn btn-secondary">User Type: {{request.user.user_type}}</button>
  <button type="button" class="btn btn-secondary">Full Name: {{request.user.full_name}}</button>
</div>

<div class="btn-group "  role="group" aria-label="Basic example">
  <a href="{% url 'add_department' %}"><button type="button"  class="btn btn-primary">Add Department</button></a>
</div>

</div>


<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">Description</th>
      <th scope="col">created_at</th>
      <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>
    <tr>
        
        {% for x in form_data %}
            
       
            
      <th scope="row">{{forloop.counter}}</th>
      <td><div>
       <span> {{x.name}}</span>  <span><a href="{% url 'view_department' x.id %}"><button type="button" class="btn btn-outline-primary btn-sm">View Doctors</button></a></span>
      </div></td>
      <td>{{x.description}}</td>
      <td>{{x.created_at}}</td>
      <td>
          
          <div class="btn-group" role="group" aria-label="Basic example">
            <a href="{% url 'edit_department' x.id %}"><button type="button" class="btn btn-info btn-sm">Edit</button></a>
            <a href="{% url 'delete_department' x.id %}"><button type="button" class="btn btn-secondary btn-sm">Delete</button></a>
            <a href="{% url 'view_department' x.id %}"><button type="button" class="btn btn-primary btn-sm">View</button></a>
           
 
</div>
      </td>
    </tr>
    {% endfor %}
    
  </tbody>
</table>
    
{% endblock blockname %}
