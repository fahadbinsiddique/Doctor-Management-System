{% extends 'master/base.html' %}

{% block blockname %}
  <section class="w-100 px-4 py-5" style="background-color: #9de2ff; border-radius: .5rem .5rem 0 0;">
    <div class="row d-flex justify-content-center">
      <div class="col col-md-9 col-lg-7 col-xl-6">
        <div class="card" style="border-radius: 15px;">
          <div class="card-body p-4">
            <div class="d-flex">
              <div class="flex-shrink-0">
                <img src="{{request.user.user_profile.profile_pic.url}}" alt="{{request.user.full_name}}" class="img-fluid" style="width: 180px; border-radius: 10px;" />
              </div>
              <div class="flex-grow-1 ms-3">
                <h5 class="mb-1">{{request.user.full_name}}</h5>
                <p class="mb-2 pb-1">{{request.user.user_type}}</p>

                <div class=" justify-content-start rounded-3 p-2 mb-2 bg-body-tertiary">
                  <div>
                    <p class="small text-muted mb-1">Address</p>
                    <p class="mb-0">{{request.user.address}}</p>
                  </div>
                  <div >
                    <p class="small text-muted mb-1">Phone Number</p>
                    <p class="mb-0">{{request.user.user_profile.phone_number}}</p>
                  </div>
                  
                </div>
                <div class="d-flex  pt-1">
                  <button type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-outline-primary me-1 flex-grow-1">lorem</button>
                  <button type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary flex-grow-1">lorem</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <a href="{% url 'logout_page' %}"><button type="button" class="btn btn-secondary">Logout</button></a>
{% endblock %}
