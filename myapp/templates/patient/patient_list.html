{% extends 'master/base.html' %}


{% block blockname %}
<div class="btn-group" role="group" aria-label="Basic example">
  <button type="button" class="btn btn-secondary">Username: {{request.user}}</button>
  <button type="button" class="btn btn-secondary">User Type: {{request.user.user_type}}</button>
  <button type="button" class="btn btn-secondary">Full Name: {{request.user.full_name}}</button>
</div>

<div class="btn-group "  role="group" aria-label="Basic example">
  <a href="{% url 'add_patient' %}"><button type="button"  class="btn btn-primary">Add Patient</button></a>
</div>



<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">Age</th>
      <th scope="col">Gender</th>
      <th scope="col">Disease</th>
      <th scope="col">Doctor</th>
      <th scope="col">Admit_date</th>
      
      <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>
    <tr>
        
        {% for x in form_data %}
            
       
            
      <th scope="row">{{forloop.counter}}</th>
      <td>{{x.name}}</td>
      <td>{{x.age}}</td>
      <td>{{x.gender}}</td>
      <td>{{x.disease}}</td>
      <td>{{x.doctor}}</td>
      <td>{{x.admit_date}}</td>
      
      
      <td>
          
          <div class="btn-group" role="group" aria-label="Basic example">
            <a href="{% url 'edit_patient' x.id %}"><button type="button" class="btn btn-info">Edit</button></a>
            <a href="{% url 'delete_patient' x.id %}"><button type="button" class="btn btn-secondary">Delete</button></a>
            <a href="{% url 'view_patient' x.id %}"><button type="button" class="btn btn-primary">View</button></a>
           
 
</div>
      </td>
    </tr>
    {% endfor %}
    
  </tbody>
</table>
    
{% endblock blockname %}
